services:
  marten-runtime:
    build:
      context: .
    image: ${MARTEN_RUNTIME_IMAGE:-marten-runtime:local}
    container_name: ${MARTEN_RUNTIME_CONTAINER_NAME:-marten-runtime}
    restart: unless-stopped
    env_file:
      - ${MARTEN_RUNTIME_ENV_FILE:-.env}
    ports:
      - "${MARTEN_RUNTIME_HOST_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - ${MARTEN_RUNTIME_DATA_DIR:-./data}:/app/data
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import json, urllib.request; payload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)); raise SystemExit(0 if payload.get('status') == 'ok' else 1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
