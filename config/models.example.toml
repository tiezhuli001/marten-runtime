# Default runtime profile for local overrides.
# Provider secrets still belong in .env.
default_profile = "openai_gpt5"

[profiles.openai_gpt5]
provider_ref = "openai"
model = "gpt-5.4"
fallback_profiles = ["minimax_m25"]
tokenizer_family = "openai_o200k"
supports_provider_usage = true

[profiles.minimax_m25]
provider_ref = "minimax"
model = "MiniMax-M2.5"
tokenizer_family = "openai_o200k"
supports_provider_usage = true
