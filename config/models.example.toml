# Default runtime profile for local overrides.
# Provider secrets still belong in .env.
default_profile = "default"

[profiles.default]
provider = "openai"
model = "gpt-5.4"
tokenizer_family = "openai_o200k"
supports_provider_usage = true

[profiles.minimax_coding]
provider = "openai"
model = "MiniMax-M2.5"
base_url = "https://api.minimaxi.com/v1"
api_key_env = "MINIMAX_API_KEY"
tokenizer_family = "openai_o200k"
supports_provider_usage = true
