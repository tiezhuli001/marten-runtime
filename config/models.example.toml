# Select the active profile here for local overrides.
# Provider secrets still belong in .env.
default_profile = "minimax_coding"

[profiles.default]
provider = "openai"
model = "gpt-4.1"

[profiles.minimax_coding]
provider = "openai"
model = "MiniMax-M2.5"
base_url = "https://api.minimax.io/v1"
api_key_env = "MINIMAX_API_KEY"
